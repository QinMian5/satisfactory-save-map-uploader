name: Bug report
description: Report something that is not working as expected.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not upload or attach real save files.
  - type: input
    id: version
    attributes:
      label: App version
      description: Use the version shown in the app or release file name.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      placeholder: "Windows 11 24H2"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include what you clicked and what happened.
      placeholder: |
        1. Open the app
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs or screenshots
      description: Remove private paths or save names if needed. Do not attach save files.

