# abstract: GitHub Actions CI for checks, type validation, tests, and Windows packaging.
# out_of_scope: Release creation, code signing, and Store submission.

name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          package-manager-cache: false
      - name: Enable pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Check
        run: pnpm run check
      - name: Build
        run: pnpm run build
      - name: Package
        run: pnpm run package
      - name: Verify package
        run: pnpm run verify:package
