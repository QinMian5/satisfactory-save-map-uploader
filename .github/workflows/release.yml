# abstract: Unsigned Windows installer build and draft release workflow.
# out_of_scope: Pull request checks, code signing, automatic publication, and Store submission.

name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-installer:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - name: Enable pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          if ("v$version" -ne "${env:GITHUB_REF_NAME}") {
            throw "Tag ${env:GITHUB_REF_NAME} does not match package.json version $version"
          }
      - name: Check
        run: pnpm run check
      - name: Build
        run: pnpm run build
      - name: Package
        run: pnpm run package
      - name: Verify package
        run: pnpm run verify:package
      - name: Make installer
        run: pnpm run make
      - name: Verify installer
        run: pnpm run verify:make
      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-squirrel-unsigned-${{ github.sha }}
          path: out/make/squirrel.windows/x64/*
          if-no-files-found: error
          retention-days: 14

  draft-release:
    name: Draft GitHub Release
    needs: windows-installer
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: windows-squirrel-unsigned-${{ github.sha }}
          path: release-artifacts
      - name: Create draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${env:GITHUB_REF_NAME}" 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw "Release ${env:GITHUB_REF_NAME} already exists."
          }
          $files = Get-ChildItem -LiteralPath "release-artifacts" -File | ForEach-Object { $_.FullName }
          if ($files.Count -eq 0) {
            throw "No release artifacts were downloaded."
          }
          $notes = "Unsigned beta/test artifacts.`nTag: ${env:GITHUB_REF_NAME}`nCommit: ${env:GITHUB_SHA}`nThese artifacts are not code signed and are not public-release ready."
          gh release create "${env:GITHUB_REF_NAME}" @files `
            --draft `
            --title "${env:GITHUB_REF_NAME}" `
            --notes "$notes"
