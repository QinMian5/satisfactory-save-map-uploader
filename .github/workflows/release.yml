# abstract: Unsigned Windows AppX package build and draft release workflow.
# out_of_scope: Pull request checks, code signing, automatic publication, and Store submission.

name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-appx:
    name: Windows AppX package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24.14.0
          package-manager-cache: false
      - name: Enable pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          if ("v$version" -ne "${env:GITHUB_REF_NAME}") {
            throw "Tag ${env:GITHUB_REF_NAME} does not match package.json version $version"
          }
      - name: Check
        run: pnpm run check
      - name: Build
        run: pnpm run build
      - name: Package
        run: pnpm run package
      - name: Verify package
        run: pnpm run verify:package
      - name: Make AppX package
        run: pnpm run make
      - name: Verify AppX package
        run: pnpm run verify:make
      - name: Upload workflow artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: windows-appx-unsigned-${{ github.sha }}
          path: |
            out/make/appx/SatisfactorySaveMapUploader-*.appx
            out/make/appx/*.sha256
          if-no-files-found: error
          retention-days: 14

  draft-release:
    name: Draft GitHub Release
    needs: windows-appx
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: windows-appx-unsigned-${{ github.sha }}
          path: release-artifacts
      - name: Create draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${env:GITHUB_REF_NAME}" 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw "Release ${env:GITHUB_REF_NAME} already exists."
          }
          $files = Get-ChildItem -LiteralPath "release-artifacts" -File | ForEach-Object { $_.FullName }
          if ($files.Count -eq 0) {
            throw "No release artifacts were downloaded."
          }
          $notes = "Unsigned beta/test artifacts.`nTag: ${env:GITHUB_REF_NAME}`nCommit: ${env:GITHUB_SHA}`nThese artifacts are not code signed and are not public-release ready."
          gh release create "${env:GITHUB_REF_NAME}" @files `
            --draft `
            --title "${env:GITHUB_REF_NAME}" `
            --notes "$notes"
